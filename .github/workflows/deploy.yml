name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to 10.0.40.71 (CT 108)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      # Standalone output structure after build:
      #   .next/standalone/          ← self-contained server (node server.js)
      #   .next/standalone/.next/    ← server-side chunks
      #   .next/static/              ← must be copied → standalone/.next/static/
      #   public/                    ← must be copied → standalone/public/
      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || echo "No public/ dir, skipping"

      - name: Transfer standalone bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: '.next/standalone/'
          target: /var/www/company-portal
          strip_components: 2

      - name: Transfer deploy scripts and PM2 config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: "scripts/,ecosystem.config.cjs"
          target: /var/www/company-portal
          strip_components: 0

      - name: Reload application via PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            bash /var/www/company-portal/scripts/deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            pm2 status company-portal
            curl -sf http://localhost:3000/ > /dev/null && echo "Health check: OK" || echo "Health check: FAILED"
