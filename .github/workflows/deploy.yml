name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner on 10.0.40.71 — builds and deploys locally, no SSH needed
    name: Deploy on CT 108 (self-hosted)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      # Standalone output: copy static assets into the standalone bundle
      - name: Assemble standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || echo "No public/ dir, skipping"

      - name: Deploy to /var/www/company-portal
        env:
          PATH: /usr/local/bin:/usr/bin:/bin
        run: |
          APP_DIR=/var/www/company-portal
          mkdir -p "$APP_DIR"

          echo "[diag] whoami: $(whoami)"
          echo "[diag] pm2 location: $(find /usr /root /home -name pm2 -type f 2>/dev/null | head -3)"
          echo "[diag] PATH: $PATH"
          echo "[diag] .env.local before rsync: $(ls -la $APP_DIR/.env.local 2>&1)"

          # Sync standalone bundle — exclude server-side config files from deletion
          rsync -a --delete \
            --exclude='.env.local' \
            --exclude='.env' \
            .next/standalone/ "$APP_DIR/"

          echo "[diag] .env.local after rsync: $(ls -la $APP_DIR/.env.local 2>&1)"

          # Keep ecosystem config and scripts up to date
          cp ecosystem.config.cjs "$APP_DIR/ecosystem.config.cjs"
          cp -r scripts "$APP_DIR/scripts"
          chmod +x "$APP_DIR/scripts/"*.sh

          # Ensure pm2 is on PATH regardless of install location
          PM2_BIN=$(find /usr /root /home -name pm2 -type f 2>/dev/null | head -1)
          if [ -n "$PM2_BIN" ]; then
            export PATH="$(dirname "$PM2_BIN"):$PATH"
            echo "[diag] pm2 found at: $PM2_BIN"
          else
            echo "[diag] WARNING: pm2 not found on filesystem"
          fi

          # Reload or start PM2
          bash "$APP_DIR/scripts/deploy.sh"

      - name: Verify deployment
        env:
          PATH: /usr/local/bin:/usr/bin:/bin
        run: |
          pm2 status company-portal
          curl -sf http://localhost:3000/ > /dev/null && echo "Health check: OK" || echo "Health check: FAILED"
